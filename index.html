<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UPB Obra Hub</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div>
        <h1>UPB Obra</h1>
        <p class="subtitle">Communications Hub</p>
      </div>

      <nav class="sidebar-nav">
        <a href="index.html" class="nav-link active">Email Generator</a>
        <a href="tracker.html" class="nav-link">Tracker</a>
      </nav>

      <div class="sidebar-section">
        <button id="themeToggle" class="secondary-btn full-width">Toggle Dark Mode</button>
      </div>

      <div class="sidebar-section">
        <h2>History</h2>
        <div id="historyList" class="history-list">
          <p class="empty-text">No saved emails yet.</p>
        </div>
        <button id="clearHistoryBtn" class="danger-btn full-width">Clear History</button>
      </div>
    </aside>

    <main class="main-content">
      <section class="card">
        <h2>Generate Email Response</h2>

        <div class="form-grid">
          <div class="form-group">
            <label for="orgName">Organization Name</label>
            <input type="text" id="orgName" placeholder="Enter organization name" />
          </div>

          <div class="form-group">
            <label for="eventName">Event Name</label>
            <input type="text" id="eventName" placeholder="Enter event name" />
          </div>
        </div>

        <div class="form-group">
          <label>Response Type</label>
          <div class="button-group">
            <button id="acceptBtn" class="primary-btn">Accept</button>
            <button id="rejectBtn" class="warning-btn">Reject</button>
          </div>
        </div>

        <div class="form-group">
          <label for="generatedEmail">Generated Email</label>
          <textarea id="generatedEmail" rows="16" placeholder="Generated email will appear here..."></textarea>
        </div>

        <div class="button-group">
          <button id="copyBtn" class="secondary-btn">Copy</button>
          <button id="saveBtn" class="primary-btn">Save to History</button>
        </div>

        <p id="statusMessage" class="status-message"></p>
      </section>

      <section class="card">
        <div class="section-header">
          <div>
            <h2>Template Manager</h2>
            <p class="helper-text">Use placeholders like <code>{organization}</code> and <code>{event}</code>.</p>
          </div>
          <div class="button-group">
            <button id="saveTemplatesBtn" class="primary-btn">Save Templates</button>
            <button id="resetTemplatesBtn" class="danger-btn">Reset to Default</button>
          </div>
        </div>

        <div class="form-group">
          <label for="acceptTemplate">Accept Template</label>
          <textarea id="acceptTemplate" rows="14"></textarea>
        </div>

        <div class="form-group">
          <label for="rejectTemplate">Reject Template</label>
          <textarea id="rejectTemplate" rows="14"></textarea>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
